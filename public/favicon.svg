<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4834d4">
                <animate attributeName="stop-color" 
                    values="#4834d4; #686de0; #22a6b3; #4834d4"
                    dur="3s" repeatCount="indefinite" />
            </stop>
            <stop offset="100%" stop-color="#686de0">
                <animate attributeName="stop-color" 
                    values="#686de0; #22a6b3; #4834d4; #686de0"
                    dur="3s" repeatCount="indefinite" />
            </stop>
        </linearGradient>
        <filter id="water">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise">
                <animate attributeName="baseFrequency" values="0.015;0.02;0.015" dur="4s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="20"/>
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <g filter="url(#water)">
        <circle cx="16" cy="16" r="10" fill="url(#gradient)" stroke="#4834d4" stroke-width="2">
            <animate attributeName="r" 
                values="8;10;9;10;8"
                dur="4s"
                repeatCount="indefinite"
                calcMode="ease-in-out" />
            <animate attributeName="stroke-opacity"
                values="0.8;0.4;0.6;0.4;0.8"
                dur="4s"
                repeatCount="indefinite"
                calcMode="ease-in-out" />
            <animate attributeName="fill-opacity"
                values="0.9;0.7;0.8;0.7;0.9"
                dur="4s"
                repeatCount="indefinite"
                calcMode="ease-in-out" />
        </circle>
    </g>
</svg> 